body:
  text: 陽為律陰為吕律娶妻吕生子娶妻則同類也生子則隔八也何為同類若子之黃鍾與丑之大吕之類是也何為隔八從丑數至申得八生夷則之類是也五行自仲而後孟自孟而後季此遁甲三元之紀也一陽生於子起於甲子之仲一陰生於午起於甲午之仲今第其位序言之甲子之仲黃鍾之商卦應乾宫乾娶同類乙丑大吕之商卦應乾宫兑隔八下生壬申金壬申之孟夷則之商卦應兑宫乾娶同類癸酉南吕之商卦應兑宫兑隔八上生庚辰金庚辰之季姑洗之商卦應離宫乾娶同類辛巳仲吕之商卦應離宫兊隔八復生戊子火戊子之仲黃鍾之祉卦應震宫離隔八下生丙申火丙申之孟夷則之祉卦應巽宫離娶同類丁酉南吕之祉卦應巽宫離隔八上生甲辰火甲辰之季姑洗之祉卦應坎宫離娶同類乙巳仲吕之祉卦應坎宫離隔八復生壬子木壬子之仲黃鍾之角卦應艮宫巽隔八下生庚申木庚申之孟夷則之角卦應坤宫震娶同類辛酉南吕之角卦應坤宫巽隔八上生戊辰木戊辰之季姑洗之角卦應乾宫震娶同類乙巳仲吕之角卦應乾宫巽隔八復生丙子水丙子之仲黃鍾之羽卦應兑宫坎娶同類丁丑大吕之羽卦應兑宫坎隔八下生甲申水甲申之孟夷則之羽卦應離宫坎娶同類乙酉南吕之羽卦應離宫坎隔八上生壬辰水壬辰之季姑洗之羽卦應震宫坎娶同類癸巳仲吕之羽卦應震宫坎隔八復生庚子土庚子之仲黃鍾之宫卦應巽宫艮娶同類半丑大吕之宫卦應巽宫坤隔八下生戊申土戊申之孟夷則之宫卦應坎宫艮娶同類己酉南吕之宫卦應坎宫坤隔八上生丙辰土丙辰之季姑洗之宫卦應艮宫艮娶同類丁巳仲吕之宫卦應艮宫坤隔八復生甲子金此皆生陽之律也甲午之仲蕤賓之商卦應巽宫乾娶同類乙未林鍾之商卦應巽宫兊隔八上生壬寅金壬寅之孟太蔟之商卦應坎宫乾娶同類癸卯夾鍾之商卦應坎宫兑隔八下生庚戌金庚戌之季無射之商卦應艮宫乾娶同類辛亥應鍾之商卦應艮宫兑隔八上生戊午火戊午之仲蕤賓之祉卦應坤宫離娶同類乙未林鍾之祉卦應坤宫離隔八上生丙寅火丙寅之孟太蔟之祉卦應乾宫午金此皆陰生之律也由子午而推陰陽之義則一律含五音十二律納六十音始而終終而始機運不窮循環無己萬物以是而生四四時以是而消長此所以通神明行造化而能配夫易之用也今列圖於後六甲隔八生六十律應歸藏卦圖甲子金黃鍾商於卦應乾乾上乾下乙丑金大吕商於卦應夬兑上乾下丙寅丁卯戊辰己巳藏庚午辛未壬申金夷則商於卦應履乾上兑下癸酉金南吕商於卦應兑兑上兑下甲戌乙亥藏丙子丁丑戊寅己卯庚辰金姑洗商於卦應同人乾上離下辛巳金仲吕商於卦應革兑上離下藏壬午癸未甲申乙酉丙戌丁亥藏戊子火黃鍾祉於卦應噬嗑離上震下己丑火大吕祉於卦應噬嗑離上震下庚寅辛卯壬辰癸巳藏甲午乙未丙申火夷則祉於卦應鼎離上巽下丁酉火南吕祉於卦應鼎離上巽下戊戌己亥藏庚子辛丑壬寅癸卯甲辰火姑洗祉於卦應未濟離上坎下乙巳火仲吕祉於卦應未濟離上坎下藏丙午丁未戊申己酉庚戌辛亥藏壬子木黃鍾角於卦應小過震上艮下癸丑木大吕角於卦應漸巽上艮下甲寅乙卯丙辰丁巳藏戊午巳未庚申木夷則角於卦應豫震上坤下辛酉木南吕角於卦應觀巽上坤下壬戌癸亥藏甲子乙丑丙寅丁卯戊辰木姑洗角於卦應大壯震上乾下己巳木仲吕角於卦應小畜巽上乾下藏庚午辛未壬申癸酉甲戌乙亥藏丙子水黃鍾羽於卦應節坎上兑下丁丑水大吕羽於卦應節坎上兑下戊寅己卯庚辰辛巳藏壬午癸未甲申水夷則羽於卦應既濟坎上離下乙酉水南吕羽於卦應既濟坎上離下丙戌丁亥藏戊子己丑庚寅辛卯壬辰水姑洗羽於卦應屯坎上震下癸巳水仲吕羽於卦應屯坎上震下藏甲午乙未丙申丁酉戊戌己亥藏庚子土黃鍾宫於卦應蠱艮上巽下辛丑土大吕宫於卦應升坤上巽下壬寅癸卯甲辰乙巳藏丙午丁未戊申土夷則宫於卦應蒙艮上坎下己酉土南吕宫於卦應師坤上坎下庚戌辛亥藏壬子癸丑甲寅乙卯丙辰土姑洗宫於卦應艮艮上艮下丁巳土仲吕宫於卦應謙坤上艮下藏戊午己未庚申辛酉壬戌癸亥藏右以上皆隔八生陽之律甲午金蕤賓商於卦應姤乾上巽下乙未金林鍾商於卦應大過兑上巽下丙申丁酉戊戌己亥藏庚子辛丑壬寅金太蔟商於卦應訟乾上坎下癸卯金夾鍾商於卦應困兑上坎下甲辰乙巳藏丙午丁未戊申巳酉庚戌金無射商於卦應遁乾上艮下辛亥金應鍾商於卦應咸兑上艮下藏壬子癸丑甲寅乙卯丙辰丁巳藏戊午火蕤賓祉於卦應晉離上坤下己未火林鍾祉於卦應晉離上坤下庚申辛酉壬戌癸亥藏甲子乙丑丙寅火太蔟祉於卦應大有離上乾下丁卯火夾鍾祉於卦應大有離上乾下戊辰己巳藏庚午辛未壬申癸酉甲戌火無射祉於卦應暌離上兑下乙亥火應鍾祉於卦應暌離上兑下藏丙子丁丑戊寅己卯庚辰辛巳藏壬午木蕤賓角於卦應豐震上離下癸未木林鍾角於卦應家人巽上離下甲申乙酉丙戌丁亥藏戊子己丑庚寅木太蔟角於卦應震震上震下辛卯木夾鍾角於卦應益巽上震下壬辰癸巳藏甲午乙未丙申丁酉戊戌木無射角於卦應恆震上巽下己亥木應鍾角於卦應巽巽上巽下藏庚子辛丑壬寅癸卯甲辰乙己藏丙午水蕤賓羽於卦應坎坎上坎下丁未水林鍾羽於卦應坎坎上坎下戊申己酉庚戌辛亥藏壬子癸丑甲寅水太蔟乙卯水夾鍾丙辰丁巳藏戊午己未庚申辛酉壬戌水無射癸亥水應鍾藏甲子乙丑丙寅丁卯戊辰己巳藏庚午土蕤賓宫於卦應大畜艮上乾下辛未土林鍾宫於卦應泰坤上乾下壬申癸酉甲戌乙亥藏丙子丁丑戊寅土太蔟宫於卦應損艮上兑下己卯土夾鍾宫於卦應臨坤上兑下庚辰辛巳藏壬午癸未甲申乙酉丙戌土無射宫於卦應賁艮上離下丁亥土應鍾宫於卦應明夷坤上離下藏戊子己丑庚寅辛卯庚辰癸巳藏右以上皆隔八生陰之律今夫六律六吕之竅大無不包小無不入察治忽定興廢驗死生見於經史𫝊記者蓋不一也是何律吕之神歟嗚呼六律六吕六十四卦之所推原於伏羲氏演於黃帝氏一聖人焉又一聖人焉相繼述作烏乎而不神况二聖人之述作又因乎天之所出圖書者也天也聖人也宜乎妙萬物而神也是故五音之顯諸用者卦與之俱顯五音之藏諸用者卦與之俱藏案隔八生陽律隂吕之圖則可見矣豫嘗閲史有紀黃帝氏咸池之樂曰無首無尾其故何也蓋黃帝歸藏易首坤尾剝是二卦為歸藏之藏卦其音則土也萬物莫不歸而藏諸土渚也此咸池樂所以無首無尾歟言黃帝氏咸池樂而不探黃帝氏歸藏易則無首無尾之辭不幾於空言矣乎豫故表而出之三易備遺卷七
