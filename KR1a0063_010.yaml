body:
  text: 三易備遺卷十宋朱元升撰後天周易周易互卦易有聖人之道四焉尚其辭尚其變尚其象尚其占也連山歸藏易亡已久後世不得見其辭周易之辭具在方册不於辭焉求之曷足以明理象數哉互體者易之變也象也占之必有辭也周易卦辭爻辭彖象之辭指互體而為辭者是或不一如小畜卦辭自我西郊指互兊也如屯爻辭女子貞不字十年乃字指互坤也如大過彖辭剛過而中指互乾也如困象辭君子以致命遂志指互巽也左氏傳晉侯將納王筮之遇大有之睽曰吉遇公用享於天子之卦也天為澤以當日天子降心以逆公不亦可乎蓋大有互兊也懿氏生敬仲周史有以周易見陳侯者使筮之遇觀之否曰是謂觀國之光利用賔于王坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上蓋觀互坤艮也春秋用互體為占尚矣則夫舍互體而言易者非善言易者也夫子曰河出圖洛出書聖人則之圖書者竒偶之始也竒偶者卦畫之始也圖書之數有正有變故卦畫之象亦有正有變河圖正數四十有五河圖之變則一涵九九復涵一三涵七七復涵三二涵八八復涵二六涵四四復涵六惟五虛中以涵四方四維之四十此河圖隂陽互體為數百有十二者變也乘數也洛書正數五十有五洛書之變則一涵於六二涵於七三涵於八四涵於九五涵於十此洛書隂陽互體為數四十者變也除數也稽之於象則有相為吻合者矣小成之卦八大成之卦六十四者正也除之而為反對之三十六乘之而為互體之百有十二者變也何以謂之互體百有二十乾坤二卦純體不互也夬姤乾之體剝復坤之體不互也既未濟坎離之體不互也餘五十六卦皆互也不互者用本卦互者除本卦其象百有二十合於河圖之變數百有二十也三而約之則為四十合於洛書之變數四十也於此見聖人作易一本諸河圖洛書固如此夫子則之之言豈欺我哉周易互卦綱目互乾乾一卦互坤坤一卦互震艮三卦互巽兊三卦互坎離三卦互乾巽兊四卦互坤震艮四卦互坎震艮四卦互離巽兊四卦互震艮巽兊四卦不互五卦凡三十有六卦該一百二十象屯下互坤上互艮坤為母未從貴為女子十為坤成數故六二曰女子貞不字十年乃字蒙下互震上互坤坤為母震為長子故九二曰納婦吉子克家需下互兑上互離兑為澤其於地也為剛鹵故九二曰需于沙九三曰需于泥訟下互離上互巽離明也故初六之象曰雖小有言其辨明也離三數也故九二曰歸而逋其邑人三百户上九曰或錫之鞶帶終朝三禠之師下互震上互坤坤為衆師衆也震為長子故六五曰長子帥師比下互坤上互艮坤為土為衆故象曰先王以建萬國親諸侯小畜下互兑上互離兑位乎西故卦辭曰密雲不雨自我西郊兑為毁折離為目故九三曰輿説輻夫妻反目履下互離上互巽離為目巽為股故六三曰眇能視跛能履泰下互兑上互震兑少女震長男故六五曰帝乙歸妹否下互艮上互巽巽以申命行事故九四之象曰有命無咎志行也同人下互巽上互乾巽為高為進退故九三曰升其高陵大有下互乾上互兑兑説也孚兑之吉信志也故六五之象曰厥孚交如信以發志也威如之吉易而無備也謙下互艮上互坎艮為小石故六二曰介于石隨下互艮上互巽艮為門闕為徑路故初九曰出門交有功蠱下互兑上互震蠱之卦辭曰先甲三日後甲三日巽之爻辭曰先庚三日後庚三日蠱互震震位於甲也巽互兑兑位於庚也臨下互震上互坤觀下互坤上互艮噬嗑下互艮上互坎坎為耳故上九曰何校滅耳賁下互坎上互震坎為輿震為足故初九曰賁其趾舍車而徒無妄下互艮上互巽大畜下互兑上互震兑為毁折故九二曰輿説輻頤下互坤上互坤坤為成數之十故六三曰十年勿用無攸利大過下互乾上互乾上下互乾大者過也故彖曰剛過而中是為大過乾為首故上九曰過涉滅頂凶坎下互震上互艮離下互巽上互兑咸下互巽上互乾巽為股故六二曰咸其腓九三曰咸其股股腓屬也恆下互乾上互兑兑為少女為妾故六五曰婦人吉遁下互巽上互乾大壯下互乾上互兑兑為羊故九三曰羝羊觸藩六五曰喪羊于易晉下互艮上互乾艮為鼠故九四曰晉如鼫鼠明夷下互坎上互震坎為美脊亟心之馬故六二曰用拯馬壯吉家人下互坎上互離睽下互離上互坎坎為曳為輿為雨為豕故六三曰見輿曳上九曰見豕負塗又曰往遇雨則吉蹇下互坎上互離艮下坎上為蹇又下互坎故六二曰王臣蹇蹇六四曰往蹇來連九五曰大蹇朋來解下互離上互坎離為網罟田也故九二曰田獲三狐三者離之數也損下互震上互坤十坤成數故六五曰或益之十朋之龜益下互坤上互艮益之六二損之六五也故六二亦曰或益之十朋之龜萃下互艮上互巽上互巽故六三之象曰往無咎上巽也升下互兑上互震兑西也故六四曰王用亨于岐山困下互離上互巽巽為申命故象曰澤無水困君子以致命遂志巽為風為木故上六曰困于葛藟于臲卼井下互兑上互離兑為毁折故九二曰甕敝漏離為明故九三曰王明並受其福革下互巽上互乾巽為申命故九四曰有孚改命鼎下互乾上互兑兑為毁折故九四曰鼎折足震下互艮上互坎艮為山故六二曰躋于九陵坎為陷故九四曰震遂泥艮下互坎上互震坎為加憂為心病故六二曰其心不快九三曰厲薰心漸下互坎上互離坎曰樽酒簋二故六二曰飲食衎衎坎為盜故九三曰利禦冦歸妹下互離上互坎離為目故九二曰眇能視坎為月故六五曰月幾望豐下互巽上互兑兑為毁折故九三曰折其右肱旅下互巽上互兑巽為近利市三倍為資斧故六二曰懷其資九四曰得其資斧巽下互兑上互離兑為巫故九二曰用史巫紛若兑位於庚故九五曰先庚三日後庚三日離為網罟以佃以漁故六三曰田獲三品兑下互離上互巽離為戈兵故彖辭曰説以犯難民忘其死渙下互震上互巽艮為山故六四曰渙有丘節下互震上互艮艮為門闕故初九曰不出户庭九二曰不出門庭中孚下互震上互艮震為馬故六四曰馬匹亡小過下互巽上互兑巽為雞故卦辭曰飛鳥遺之音彖辭又曰有飛鳥之象焉中孚本卦巽上故中孚上九曰翰音登于天自漢以來言易者有取互卦有不取互卦蓋相半也然左氏傳晉侯謀納王筮遇大有之睽懿氏生敬仲筮遇觀之否是皆以互卦驗人事當否若符左契者又嘗求諸大傳之辭抑有可證焉大傳曰雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣又曰二與四同功而異位二多譽四多懼三與五同功而異位三多凶五多功且卦有六爻夫子獨取中爻二四三五以為言者互卦之謂也互卦取二三四為下互是二與四為應互卦取三四五為上互是三與五為應若夫六爻之正例初與四相應二與五相應三與六相應宜與互爻之應不相似然者夫子言二與四同功三與五同功舉互卦之例為言也故曰雜物撰德辨是與非則非其中爻不備學者諦觀大傳之辭庶乎可矣三易備遺卷十
