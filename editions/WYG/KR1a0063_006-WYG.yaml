body:
  text: 三易備遺卷六宋朱元昇撰中天歸藏易歸藏首純坤歸藏易以純坤為首坤為地萬物莫不歸而藏於中者也萬物盈宇宙間芽者甲者動者植者物物一太極流動不已在在呈露孰非此造化之顯諸仁也嗚呼顯諸仁者實藏諸用者為之也其理渾淪其氣宻栗其時嚴凝其象純坤說卦曰坤以藏之蓋造化𤼵育之真機常於此藏焉然而一元有一元之造化癸亥甲子之交為之藏一嵗有一嵗之造化冬夏二至之交為之藏一日有一日之造化夜半日中之交為之藏是又歸藏易無所往而不用其藏也六十四卦藏者十有六用者四十有八乾為六十四卦之父坤為六十四卦之母坤統藏卦乾統用卦坤乾所以首六十四卦也有藏者斯有用者純坤又所以首純乾也雖然又豈黄帝氏私意為是臆度哉亦惟循伏羲氏之卦序而已伏羲氏畫六十四卦首乾而終坤黄帝氏造六甲以配六十四卦首甲子而終癸亥甲子癸亥之間藏土配剥坤是為一元造化歸藏之㑹剥𨽻癸亥而比則癸亥之用卦也坤𨽻甲子而乾則甲子之用卦也甲子為造化之首故坤乾為歸藏之首以自然之數納自然之音符自然之象一本乎自然而然也夫子因言偃之問而𤼵坤乾之義後世因坤乾之義而遡歸藏之㫖天下永賴歸藏之功用者言偃一問之力歟予嘗曰乾坤分太極為二坤乾合太極為一盖以連山首乾尾坤而分太極歸藏以乾藏坤而合太極分則一而二合則二而一非二不足以見乾坤之定位非一不足以見乾坤之妙理江都李衡編周易義海紀陳臯之說曰乾為君為父坤為臣為母艮為子為少陽聖人設教以尊為先則順故周易先乾謂商人先坤夏后氏先艮是先列臣子而後君父故坤乾之說近乎誕妄嗚呼為此說者知乾坤之分處未知乾坤之合處也乾以陽索坤而地氣上騰是乾中有坤坤以隂索乾而天氣下降是坤中有乾於道曰泰於志曰同於天地曰交黄帝𤼵其秘商人暢其用夫子明其義實萬世之經也陳臯以為誕妄不其固乎愚嘗推演坤乾之合而有感焉乾元稱大哉復曰知至至之既大矣亦未嘗不至焉坤元稱至哉復曰含𢎞光大既至矣亦未嘗不大焉乾嘗包坤坤嘗資乾一既分二二復合一論乾坤者盍以是觀之氣左旋象右轉造化自然之理也聖人制作與造化同流亦不外乎此自然之理而已歸藏易以六甲配六十四卦所藏者五行之氣也所用者五行之象也以其氣之藏者言之金火木水土之序自東而之南自南而之西自西而之北終而復始是為氣之運也即天左旋之理也又以其象之用者言之金火木水土之序自北而之西自西而之南自南而之東終而復始是為象之運也即日月星辰右旋之理也然則氣之與象往来相錯而成變化欲求其在造化者求諸易斯可見矣不然大𫝊何以曰易與天地凖故能彌綸天地之道天生五行充滿宇宙間無在無不在布象于天則為五星分位于地則為五方稟賦于人則為五常播于音律則為五聲發于文章則為五色總其精氣之用則曰五行生生化化不可一闕闕土則金無以生闕金則水無以生闕水則本無以生闕木則火無以生闕火則土無以生可以相有而不可以相無也然黄帝以六甲納音之五行配伏羲六十四卦之五行由金而火由火而木由木而水土一定之序闕一則汨陳矣今自甲子至辛未具金火木土而闕水自壬申至己夘具金火水土而闕木自庚辰至丁亥具金木水土而闕火自戊子至癸已具火木水而闕金土自甲午至辛丑具金火木土而闕水自壬寅至己酉具金火水土而闕木自庚戌至丁已具金木水土而闕火自戊午至癸亥具火木水而闕金土五行凡八周於六甲中具者三十闕者十闕者果何義哉嗚呼三代以降寥寥數千載間生民日用常行不可無此六甲然終莫曉六甲中之五行其所以具所以闕之義職其所由蓋自黄帝歸藏易之不明始夫其所以具者歸藏易之用音也其所以闕者歸藏易之藏音也藏於不用是乃所以用也以為在於無物之前而未嘗不立於有物之後以為在於隂陽之外而未嘗不行於隂陽之中該體用妙動静兼有無貫隠顯此藏而用無極而太極之謂也是故用音固配伏羲氏之卦象也藏音亦莫不配伏羲氏之卦象也藏豈空虚寂滅云乎哉歸藏之卦藏者十有六用者四十有八藏者固所以為用也何者道未嘗一日不在天下天下未嘗一日離道之用有體必有用乃帝王之學也否則清净寂滅之說一倡置斯道於空虚無用之地生民之禍可勝言哉雖然易之卦六十四歸藏用卦止四十八聖人果何意耶盖八卦為六十四卦之祖也八卦之爻四十八又為六十四卦之爻三百八十四之祖也言八卦則六十四卦在其中言四十八爻則三百八十四爻在其中舉其宏綱撮其樞要此歸藏易以四十八卦為用實倣四十八爻之數也然八卦之四十八爻既為用卦之綱領矣而八卦中之坤與離又何以在藏卦之列也大抵卦有用之用有藏之用繫辭述聖人取三十卦以便民用而十三卦之中有歸藏之藏者四有歸藏之用者九然則用者固用也而藏者亦未嘗不用也知藏之為藏不知藏之為用則末流之弊鮮不為清净寂滅之歸程子曰體用一源顯微無間盡之矣囿於物者不能物物惟不物之物而後能統萬物滯於形者不能形形惟不形之形而後能貫萬形五行之在天地間金之陶冶火之烹飪木之繩墨水之灌溉土之畊墾疑若囿於物滯於形也嗚呼以五行用五行則五行特物耳形耳以易用五行則自無出有之謂變自有入無之謂化所謂不物之物不形之形者也乾兊屬金而乾兊宫有金之金金之火金之木金之水金之土離屬火而離宫有火之金火之火火之木火之水火之土震巽屬木而震巽宫有木之金木之火木之木木之水木之土坎屬水而坎宫有水之金水之火水之木水之水水之土艮坤屬土而艮坤宫有土之金土之火土之木土之水土之土迭相錯綜更相經緯其變化可勝窮哉是知五行配六十四卦初不見其不足一行中各具五行亦不見其有餘散一本而萬殊㑹萬殊而一本五行一隂陽隂陽一太極也六甲納音入六十四卦合於自然六甲以五演為六十之數以八演為六十四之數宜若參差而難齊也今先天卦象與六十納音位序悉皆脗合不可加毫末於其間何也盖八卦六甲其規模雖不同而同具五行之理五行之在八卦也水火卦各一木金土卦各二五行之在六甲也用音二十藏音六十盈縮之機其在兹乎且伏羲之演八卦為六十四卦也不能増水火之卦使之多不能損金木土之卦使之少曰因乎卦象之自然而已黄帝之造六甲納音也不能備每宫五音而使之足不能泯每官藏音而使之無亦曰因乎聲音之自然而已於是以三十二音直水火之卦十有六其中用音二十四藏音則八也以四十八音直金木土之卦四十八其中用音三十六藏音則十二也然則六甲之音與六十四卦之象自然脗合無餘無欠一順天理之流行實造化之大巧易道之至神也邵子以策數應六甲數正合歸藏易邵子曰卦有六十四而用止於六十何也六十卦者三百六十爻也故甲子止於六十也六甲而天道窮矣是以策數應之嗚呼歸藏之失其𫝊也久矣惟吾夫子闡歸藏具乾乾之義而邵子復闡策數應六甲之用微吾夫子與邵子則歸藏之易其不陸沉歟且何以謂之策數應六甲蓋乾老陽三十六與坤老隂二十四合之為六十也震坎艮少陽三十二與巽離兊少隂二十八合之亦六十也納音以十幹加十二支合之為六十也鐘律以五聲加十二律合之亦六十也其機括樞紐皆在是矣至於六甲與策數相為盈縮之機雖秘而實露雖隠而實彰此歸藏所以無終絶之理也諸家卦氣直日本末易家卦氣直日之說尚矣易與天地凖變通配四時隂陽之義配日月聖人通乎晝夜之道故極數知来有以見天下之賾如蠱之先甲後甲巽之先庚後庚明夷之三日不食復之七日来復臨之八月有凶歸妹之良月幾望漸之三嵗不孕同人之三嵗不興屯之十年乃字頤之十年勿用之類是矣至漢初則田何丁寛已有卦氣直日之說其流則為施讎孟喜梁丘賀之徒分為三家競相傳習今案易緯稽覽圗云卦氣起中孚故離坎震兊各主一方其餘六十卦卦有六爻爻别主一日凡主三百六十日餘有五日四分日之一者每日分為八十分五日分為四百分四分日之一又為二十分是四百二十分六十卦分之六七四十二是每卦得六日七分也然而一卦六爻爻各直一日又總直七分何其參差而難齊也况自冬至起於中孚至大雪終於頤盡變三易之位序其穿鑿無據皆出於私意矣又有東郡京房受學梁人焦延夀史氏謂其分六十四卦更直日用事以風雨寒温為候孟康謂其法以一爻主一日分一日為八十分分起夜半六十四卦為三百六十日餘四卦卦震離兊坎為二至二分用事之日又是四時各専主之氣為方伯監司之官各以其日觀善惡然予觀房所自為易傳則八宫卦祖各自統五世及逰魂二世以為卦序用配一嵗之干支起積筭法及其弊也以六十四卦分𨽻六甲或以一日辰而起三卦者或以一日辰而起二卦一卦者其間又有日辰不起卦而附於他日辰之卦者其臆說求騐破碎支離亦可見矣揚子雲覃思渾天作元擬易即九九之數以凖八八之義其法三方轉而為九州九州轉而為二十七部二十七部轉而為八十一首首有九賛賛分晝夜而為七百二十九有竒以應三百六旬有六日之度其用心亦甚宻矣然而以中凖中孚而應冬至以差凖小過而應立春以釋凖解而應春分以裝凖旅而應立夏以應凖咸而應夏至以常凖恒而應立秋以飾凖賁而應秋分以堅凖艮而應立冬雖曰度數細宻果何闗於易也其後有劉氏以天地五十五之數布之五行自丙丁至甲乙為一周其辰子丑午未自甲乙至壬癸為一周其辰寅夘申酉自壬癸至庚辛為一周其辰辰己戌亥故上經三十卦三周而成六十卦當朞之日其策一萬一千五百二十故漢上朱震駁之曰劉氏配五行生成之數五十居中水火居右木金居左始於丙丁終扵庚辛周而復始六十日之納音盡矣此一律合五音而成六十律之說也而配於易之上經三十卦則不合矣雖甲子始於乾而癸亥終於離則又不合矣乾當甲子金而二十九卦豈盡然哉繫辭言二篇之策當萬物之數而謂三周五十五數一百八十爻為萬物之數是未之聞也又有南康戴師愈者偽麻衣易謂一嵗三百六十而爻數三百八十四是二十四爻為餘也蓋八卦互相合體以立諸卦則諸卦者八卦在其中矣而又有八純卦則其合體八卦為重復而二十四數為疊也故三百六十為正爻與每嵗之數合而三百八十四與閏嵗之數合天度或贏或縮至三年則乾坤氣數始足於此自然脗合無餘欠矣及以八純卦所餘之爻求配閏嵗之數雖推至一章一蔀尚不可得而合豈能以三年而氣數無餘欠哉嗚呼易道至賾天道至幽惟以自然之數合自然之音以自然之音合自然之象大而與世運相為盛衰小而與日時相為消長如以燈取影逆來順往旁見側出横斜平直各相乗除不差絲髪而皆合於自然者其惟黄帝氏之歸藏易乎彼數君子者惟其昧於先天之學而失其位序所以方鑿而圎枘雖良工無以措其巧心也三易備遺卷六
