body:
  text: 三易備遺卷一宋朱元昇撰河圗洛書圗書述意河圗洛書天授之聖人以覺斯世者也圗之數四十有五書之數五十有五夫子曰河出圗洛出書聖人則之此之謂也所以則之者何如曰聖人則河圗以定八卦乾南坤北離東坎西震巽艮兊居四維者是也聖人則洛書以定八卦離南坎北震東兊西乾坤艮巽居四維者是也總天一天三天五之生數為乾之用九總地二地四之生數為坤之用六此聖人兼則之河圗洛書者也河圗之位乾統三男處成數坤統三女處生數洛書之位乾統三男居東北坤統三女居西南分隂分陽男女有别此聖人又兼則之河圗洛書者也象天數之竒而衡聨故為陽儀之􅅀象地數之偶而縱對故為隂儀之􅄲此聖人獨則之河圗者也數之配五行有易其方有不易其方者故卦之配五行亦有易其位有不易其位者是殆啟納音之微機具五行之功用陽數竒居四方之正隂數偶居四方之維故卦之居四正者純乎一卦之居四維者反覆為二是殆啟反對之微機具六六之妙用此聖人又獨則之河圗者也凡此條目皆因自然之數證自然之象明自然之理本之夫子大𫝊之辭而為之圗與說推往順来逆八卦之㫖以四十五數為河圗推起震終艮八卦之㫖以五十五數為洛書不過闡聖人則天道之自然與斯世同覺者也若夫闗子明以四十五數為洛書以五十五數為河圗與劉長民所述不同朱子文公黜長民之說而是子明愚也本夫子之辭而符長民匪曰敢自異於先生長者亦惟其是而已耳述圗書備遺河圗之數四十有五一居北而六居西北其位為水二居西南而七居西其位為金三居東而八居東北其位為木四居東南而九居南其位為火五居中其位為土聖人則之其設卦之所由始乎大𫝊曰參伍以變錯綜其數考之河圗縦而數之一五九是為十五八三四亦十五也六七二亦十五也衡而數之八一六是為十五三五七亦十五也四九二亦十五也交互數之四五六是為十五二五八亦十五也此所謂參伍以變錯綜其數者也洛書之數五十有五天一生水成之者地六地二生火成之者天七天三生木成之者地八地四生金成之者天九天五生土成之者地十聖人則之其設卦之所由備乎大𫝊曰天一地二天三地四天五地六天七地八天九地十又曰天數五地數五五位相得而各有合考之洛書天數五一三五七九是也地數五二四六八十是也一與六合於北二與七合於南三與八合於東四與九合於西五與十合於中五位相得而各有合也此所以成變化而行鬼神也易變易也大𫝊曰剛柔相推變在其中矣河圗之交其變之始乎今以河圗竒偶之數案之先天之圗蓋可見矣其為數也竒數自一左旋至三至五至七復右旋以至於九偶數自二右旋至四至六復左旋以至於八其為卦也左位之卦自乾一右旋至兊二離三震四右位之卦自巽五左旋至坎六艮七坤八大抵數以逆来則卦以順往數以順往則卦以逆来以數之交錯為卦之逆順剛柔相摩八卦相盪變化無窮矣斯易之所以神歟十數者天地之全數也河圗中虚十數四方四維皆具十數洛書中實十數四方亦具十數自今觀之河圗一對九為十也而洛書生數之一聨成數之九交於西北非十而何河圗三對七為十也而洛書生數之三聨成數之七交於東南非十而何河圗四對六為十二對八為十也而洛書生數之四聨成數之六交於西北生數之二聨成數之八交於東南非十而何交於東南者不混於西北交於西北者不混於東南豈旡其故盖一與四生數也合而為五位於西北金水相生也二與三生數也合而為五位於東南木火相生也一與四合五數處於内而六與九合十五數周於外二與三合五數處於内而七與八合十五數周於外井乎其不相混也不特此也中宫之土寄位於艮坤分位於東北西南東之木南之火遇坤土而成也西之金北之水遇艮土而成也㑹而歸之則中宫之土實管攝焉故以東南之數二十涵中宫之五數則與天數之二十五合涵中宫之十數則與地數之三十合以西北之數二十涵中宫之五數則與天數之二十五合涵中宫之十數則與地數之三十合此數至十而成所以為造化之全功也大衍五十數本河圗洛書言大衍者多矣求合乎河圗之數則曰貴陽而進五求合乎洛書之數則曰賤隂而退五及究其所進之五圗旡兩五究其所退之五書實有五旡者不可有有者不可旡是殆意揣臆度為之說非圗書實然之數也且盈天地間物物旡獨必有對洛書乃河圗之對五十五數乃四十五數之對分圗書而言圗多陽也書多隂也合圗書而觀總具百數五十為陽五十為隂陽對隂隂對陽旡餘也旡欠也是故以五十陽數配五十隂數隂陽合徳為大衍之數五十由是探之以神物六十四卦三百八十四爻胥此焉生乾坤合其策是為三百有六十當期之日也二篇合其策是為萬有一千五百二十當萬物之數也大抵皆然孰謂圗自圗書自書者乎不然筮何取於蓍哉蓍一本百莖象圗書之數有百也置五十而揲五十象圗書之數配隂陽為五十也言大衍者即此觀之思過半矣河圗納音例一六水之體數火之用數先天卦序坤艮土居之水以五為用數故五土之卦坤艮居一六水數之位明水納土成音也二七火之體數土之用數先天卦序坎水居之火以一六為用數故一六水之卦坎居七火數之位明火納水成音也三八木之體數木之用數先天卦序震木位於本數之八以木自能成音也故本卦自居本數之位四九金之體數金之用數先天卦序乾金位於本數之九兊金位於本數之四以金自能成音故本卦自居本數之位五十土之體數水之用數土居中寄位四季納火成音離火以土寄位者也故火二與木三交互其位子居母位母居子位案河圗乾居九數兊居四數厥數惟金厥卦惟金震居八數厥數惟木厥卦惟木數與卦相合也至於他數與卦若不相似焉者何也此當扵納音求之金自能成音故兊乾之金從本數居四與九木自能成音故震之木從本數居八若夫水一六數納土成音水遂從土數五故坤土艮土往居水之一六位火二七數納水成音火遂從水數一六故坎水往居火之七位土納火成音曷為火不居土五之位土分旺寄位者也故離火遂與巽木交互其位離火居木三之位子依母也巽木居火二之位母従子也此八卦之象合河圗之數然也案洛書一六水數厥卦惟坎厥方惟北二七火數厥卦惟離厥方惟南三八木數居東卦則震巽𨽻之四九金數居西卦則乾兊𨽻之五與十居中土數也卦則坤艮𨽻之寄位東北與西南數與卦相合卦與方相應五行以之而序八卦以之而定四方以之而奠此八卦之象合洛書之數然也夫子言易有聖人之道曰非天下之至精其孰能與於此曰非天下之至變其孰能與於此曰非天下之至神其孰能與於此觀此二圗交以河圗則六十四卦之序皆乾一兊二離三震四巽五坎六艮七坤八往者順来者逆也交以洛書則六十四卦之序皆出震齊巽見離役坤說兊戰乾勞坎成艮也嗚呼天出圗書以示聖人聖人畫卦以法天非至精至變至神其孰能與於此九為河圗十為洛書端可證矣圗之數有九卦之位有八乾稱父位成數之九坤稱母位生數之一一涵九也震為長男位成數之八巽為長女位生數之二二涵八也坎為中男位成數之七離為中女位生數之三三涵七也艮為少男位成數之六兊為少女位生數之四四涵六也五數居中又所以總諸數也是故乾統三男居成數之位坤統三女居生數之位獨陽不成獨隂不生所以配道也長幼有序男女有别所以明倫也男女正而家道正正家而天下定所以致用也噫易豈虚𤣥云乎哉河圗置坤母巽離兊三女於生數之一二三四置乾父震坎艮三男於成數之九八七六是以數之生成别男女者也洛書乾統三男居東北坤統三女居西南是以位之左右别男女者也即洛書而方之河圗金木土之𨽻乾兊震巽坤艮也象分生成之數為二水火之𨽻坎離也象合生成之數為一數同而位不同者乾兊也數與位俱不同者坤艮震巽坎離也然則圗書象數果不同歟聖人設象以配數因數以定象其别男女之序同一㫖耳河圗洛書異同河圗洛書皆天之所出皆聖人之所則其所以異所以同者先儒言之備矣若夫圗之竒數始於左旋終於右旋逆布也偶數始於右旋終於左旋順布也書則竒偶同一右旋焉此其異者然耳圗之竒居四正而五居中貴陽也偶居四維而虚其十賤隂也書則竒偶得以相配焉此其異者又然耳圗之一也三也七也九也其象衡而竒故陽儀之畫則之至於書則竒之衡无以異於偶焉圗之二也四也六也八也其象縦而偶故隂儀之畫則之至於書則偶之衡无以異於竒焉此其異者又然耳其所為同者圗一生水而六與一為聨與書之一六生成合旡以異也圗二生火而七與二為聨與書之二七生成合无以異也圗三生木而八與三為聨與書之三八生成合无以異也圗四生金而九與四為聨與書之四九生成合无以異也惟五生土圗虚其十與書不同然土旺四季圗一對九為十二對八為十三對七為十四對六為十十之體不具十之用已該與書之五與十生成合亦何以異不特此也河圗之數竒贏偶乏洛書之數竒乏偶贏人惟見不同耳豈知黙相脗合之妙又當於生成之合者求之何也天一地二天三地四天五生數也合之其為數也十有五地六天七地八天九地十成數也合之其為數也四十圗書之周於外者總其數皆四十合成數也圗之虚其中則涵十有五書之實其中則具十有五合生數也以體分之則互於中外各具生成以數合之則生數處中成數處外於此見生生造化皆自中起圗書之異也同也可得而言矣納音方位禹謨洪範五行異同納音五行之序曰金火木水土方位五行之序曰水木火金土禹謨五行之序曰水火金木土洪範五行之序曰水火木金土四者不同何也曰自河圗洛書求之則得之矣納音五行禹謨五行其序本於河圗方位五行洪範五行其序本於洛書何以言之河圗納音以乾一兊二離三震四巽五坎六艮七坤八為序乾兊金也離火也震巽木也坎水也艮坤土也故納音五行之序曰金火木水土河圗一六本水數居北七二本火數居西九四本金數居南三八本木數居東五土居中故禹謨五行之序曰水火金木土以是知納音五行禹謨五行皆以河圗之序為序者也至若方位五行先言木而後言火洪範五行先言火而後言木今以洛書之方觀之自北方水而之東方木自東方木而之南方火自南方火而之西方金居中寄位於東北西南則土也故方位五行之序曰水木火金土又以洛書之數觀之自天一水次以地二火次以天三木次以地四金次以天五土故洪範五行之序曰水火木金土以是知方位五行洪範五行皆以洛書之序為序者也嗚呼聖人立言垂世豈偶然哉有所本也不然何以曰河出圗洛出書聖人則之抑於此又知大禹準河圖而明謨箕子倚洛書而作範關氏劉氏圗書之辨於斯可考三易備遺卷一
