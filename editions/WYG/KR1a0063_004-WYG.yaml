body:
  text: 三易備遺卷四宋朱元昇撰隂儀三十二卦長分消翕例巽宫五姤起坤過大起剥鼎起比恒起觀巽起豫井起晉蠱起萃升起否坎宫六訟起謙困起訟濟未起蹇解起漸渙起過小坎起旅蒙起咸師起遯艮宫七遯起師咸起蒙旅起坎過小起渙漸起解蹇起濟未艮起困謙起訟坤宫八否起升萃起蠱晉起井豫起巽觀起恒比起鼎剥起過大坤起垢周禮太卜簭人並掌三易之法是以知周人筮法不獨用周易也自連山歸藏失其𫝊筮法惟周易可考耳以周易筮者尚其變朱子文公著易學啟蒙具占變之例三十二圗為之跋曰三十二圗反復之則為六十四圗圗以一卦為主而各具六十四卦凡四千九十六卦與焦贛易林合其條理精宻有先儒所未𤼵者覽者詳之今予以予所具連山易長分消翕圗參之文公所具占變圗蓋一而二二而一者也第文公言夫象之變之所之而不言夫數之往者順來者逆也言夫四千九十六卦之與焦贛易林合不言夫周易之占變與連山易之占長分消翕合也予恨生世之不早不逢文公之時不得執經考亭難疑荅問以𤼵明三易之藴抑予之不遇亦連山歸藏易之不遇也歟蔡季通有言曰所謂三易者皆本於伏羲之圗而取象繫辭以定吉凶者名不同耳連山首艮歸藏首坤周易首乾連山歸藏雖不𫝊意其作用必與周易大異然作用雖異其為道則一太極也噫季通之言似矣烏知連山之作用與周易之作用本不大異予焉得與斯人同時而尚論古之人也三易備遺卷四
  hash: sha256:e581b9fba727a7c998ba280824d5299c32c3ea947162579262f6fffcdc80abe9
