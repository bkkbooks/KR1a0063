body:
  text: 三易備遺卷三宋朱元昇撰先天連山易六十四卦長分消翕長分消翕者連山易至精至變至神之理寓焉欲明其理明其象斯可矣欲明其象明其數斯可矣所謂數者一生二二生四四生八八生十六十六生三十二三十二生六十四此先天圗中生自然數也卦之長者分者消者翕者莫不囿於斯數之中也方其翕而長也數逆行象順行數則自三十二至十六自十六至八自八至四自四至二自二至一象則隨數而長自初爻長至上爻方其長而分也數順行象逆行數則自一至二自二至四自四至八自八至十六自十六至三十二象則隨數而分自五爻分至初爻方其分而消也數逆行象順行數則自三十二至十六自十六至八自八至四自四至二自二至一象則隨數而消自初爻消至上爻方其消而翕也數順行象逆行數則自一至二自二至四自四至八自八至十六自十六至三十二象則隨數而翕自五爻翕至初爻長而分分而消消而復翕翕而復長數往者順知来者逆逆順往来不相悖馳故數與象合象與理合理與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶莫非自然而然雖然數起於一備於六十四卦各卦之長分消翕止於三十二何也盖翕之之交其數三十二分消之交其數亦三十二兩其三十二是為六十四案圗則可見矣觀物外篇曰震以長之乾以分之巽以消之坤以翕之邵子特舉乾一卦以例之耳今列六十四卦各為之圗庶觀易者易覽云陽儀三十二卦對隂儀三十二卦迭為長分消翕例乾坤乾夬有大壮大畜小需畜大泰二宫坤剥比觀豫晉萃否卦相乾與坤對乾之長即坤之消乾之分即坤之翕對代坤之長即乾之消坤之分即乾之翕艮兊履兊暌妹歸孚中節損臨二宫謙艮蹇漸過小旅咸遯卦相兊與艮對兊之長即艮之消兊之分即艮之翕對代艮之長即兊之消艮之分即兊之翕離坎人同革離豐人家濟既賁夷明二宫師蒙坎渙解濟未困訟卦相離與坎對離之長即坎之消離之分即坎之翕對代坎之長即離之消坎之分即離之翕震巽妄旡隨嗑噬震益屯頤復二宫升蠱井巽恒鼎過大姤卦相震與巽對震之長即巽之消震之分即巽之翕對代巽之長即震之消巽之分即震之翕餘五十六卦兩兩相對長分消翕悉凖八卦例陽儀三十二卦長分消翕例乾宫一乾起復夬起頤有大起屯壮大起益畜小起震需起嗑噬畜大起隨泰起妄旡兊宫二履起夷明兊起賁暌起濟既妹歸起人家孚中起豐節起離損起革臨起人同離宫三人同起臨革起損離起節豐起孚中人家起妹歸濟既起暌賁起兊夷明起履震宫四妄旡起泰隨起畜大嗑噬起需震起畜小益起壯大屯起有大頤起夬復起乾三易備遺卷三
