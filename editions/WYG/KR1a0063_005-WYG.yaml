  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0063_WYG_005-1a, image: WYG0020/WYG0020-0809a.png}
body:
  text: 三易備遺卷五宋朱元昇撰中天歸藏易歸藏述意歸藏易黄帝演伏羲連山易而作也以自然之數合自然之音以自然之音合自然之象由甲子藏坤納乾至癸亥納比藏剥首坤乾終比剥循伏羲六十四卦三百八十四爻之序與六甲五子無一毫不相合者孔子曰吾得坤乾焉斯歸藏易之謂也孔頴達諸儒皆謂歸藏起於黄帝用於商代案世譜等書黄帝一曰歸藏氏又案帝王世系商代諸君悉以甲乙丙丁戊己庚辛壬癸為名夫名氏帝王大寳也聖人奚取焉正以歸藏易寫天地之心類萬物之情大而與世運相為流通小而與日時相為統攝凡原性命制禮樂定度量均權石齊民紀聽軍聲頒正朔觀氣候莫不一本於此真造化之至神易道之至精生民不可一日無者也愚懼後之人昧歸藏之義以卦象自卦象以干支自干支甚失黄帝演伏羲易之本志愚扵是述歸藏備遺紀歸藏易曰中天文王有先天後天之辭太𤣥有中天之名邵子於觀物外篇以伏羲易為先天以文王易為後天迨伯温著皇極經世系述則曰唐虞者其中天而興乎堯舜者其應運而生乎是又以唐虞之時為中天然愚考周禮三易之序曰一曰連山二曰歸藏三曰周易伏羲連山既以先天維之文王周易既以後天紀之則黄帝歸藏不得不維以中天是盖本周禮所述三易之序云爾非敢自異於伯温也若夫文言曰先天而天弗違後天而奉天時太𤣥列九天之名一曰中天此先天後天中天其義又各有㫖非此之謂歸藏綱目甲子九九藏坤交五四己巳九四藏需交八九庚午八九藏坤交九四乙亥八四藏妹歸交七九丙子七九藏孚中交八四辛巳七四藏離交六九壬午六九藏離交七四丁亥六四藏妄无交五九戊子五九藏隨交六四癸巳五四藏頤交九九甲午九九藏復交五四己亥九四藏井交八九庚子八九藏井交九四乙巳八四藏解交七九丙午七九藏渙交八四辛亥七四藏旅交六九壬子六九藏旅交七四丁巳六四藏否交五九戊午五九藏萃交六四癸亥五四藏剥交九九賈公彦釋歸藏之㫖曰歸藏以純坤為首坤為地萬物莫不歸而藏於中故名曰歸藏夫歸藏雖自黄帝而作實循伏羲之卦序案漢律厯志曰伏羲畫八卦由數起至黄帝而大備是知伏羲易與黄帝易一以貫之而已昔黄帝命大撓造甲子命伶倫造律吕探五行之精以甲乙名日謂之干以子丑名月謂之支干者幹之義陽也支者枝之義隂也干十而支十二是陽數中有隂數隂數中有陽數干支相配以成六旬是謂六甲循六甲以配六十四卦始於坤乾終扵比剥而歸藏之易在是矣暨商人之用歸藏也雖簡編無𫝊然子孫寳之乃至於世世用六甲之名以為名號盖亦可考周文王通其變而演其義取六十四卦而約為三十六卦是為周易然周禮一書於太僕則掌三易之法於簭人則掌三易以辨九簭之名初未嘗以周易廢歸藏也案魯襄公九年穆姜為筮而遇艮之八杜預釋之曰是雜用連山歸藏周易也以此見春秋之時歸藏尚無恙也是以孔子曰我欲觀殷道是故之宋而不足徵也吾得坤乾焉釋者曰孔子得商隂陽之書也其書存者有歸藏嗚呼歸藏之易雖逺矣歸藏之道厯千載如一日賴吾夫子此一言之功也自是而降史𫝊無聞隋經籍志謂歸藏漢初已亡雖晉中經有之惟載卜筮不似聖人之㫖以本卦尚存故取冠於周易以備殷商之闕至今則俱亡矣然歸藏之書雖亡而先天連山之卦序歸藏庶幾其可推乎苟知歸藏之緼周易庶幾其可明乎說卦曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之此歸藏坤乾圗稽之說卦此章之辭而作也八卦之位悉循說卦此辭之序六甲五子之運悉循先天乾一兊二離三震四巽五坎六艮七坤八之序皆自然而然意者夫子得坤乾於宋闡微辭於說卦歟不然說卦何以曰昔者聖人之作易也既一言之而又申言之歟歸藏易作於黄帝因於殷代其昔者聖人之作歟且說卦一篇序卦位者凡三章其一曰天地定位山澤通氣雷風相薄水火不相射次二曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之次三曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮此三章序聖人設卦之位有不相似然者盖亦各有㫖也言易者不深揣此三章措辭之不同者何故乃為之說曰此夫子汎言易耳欲為辨别秪成駢贅又否則曰此乃一時講師各以所聞述其辭是以有不同非夫子係易之作以故聖人作易之心壹􅉱不能自達於後世可勝言哉夫此三章序卦有如此不同者正所以闡伏羲則河圗洛書作連山易黄帝因伏羲則河圗作歸藏易非偶然措辭之不相似然者也其曰坤以藏之其辭約而博微而顯者歟河圗洛書具五行生生之理也洛書東木南火中央土西金北水明相生之序也河圗三八木在東四九金在南二七火在西一六水在北五土在中央其序不相生何歟河圗為納音用者也相生之序實寓於納音之中莫非自然而然水本無音因土激之則有音故水居五土之數火本無音因水湊之則有音故火居一六水之數土本無音因火陶之則有音故土居二七火之數惟木金自能有音故不易其數是以水生木木生火火生土土生金金生水位序相聨生生而不息矣然則五行納音數與五行生成數若相反也實相因也五行生成數自洛書中來五行納音數自河圗中來河圗洛書其相為表裏者歟四象八卦策數例太陽位居一乾數九少隂位居二巽離兊數八少陽位居三震坎艮數七太隂位居四坤數六十干策數例甲已位居一其數九乙庚位居二其數八丙辛位居三其數七丁壬位居四其數六戊癸位居五其數五十二支策數例子午位居一其數九丑未位居二其數八寅申位居三其數七夘酉位居四其數六辰戌位居五其數五己亥位居六其數四凡四象十干十二支位一者其策九位二者其策八位三者其策七位四者其策六位五者其策五位六者其策四何也則乎河圗之數一九相涵二八相涵四六相涵各為十也十者太極之全數也揚子雲述𤣥數曰子午之數九丑未八寅申七卯酉六辰戌五己亥四又曰甲巳之數九乙庚八丙辛七丁壬六戊癸五晉史述戴洋為庾亮占曰寅數七子數九由是言之斯數也自伏羲氏之作易則具在四象八卦自黄帝氏之造甲子則具在十干十二支子雲得之而𤣥戴洋得之而占斯數固賾隨用隨著故曰神而明之存乎其人邵子曰策不用十有無之極也以况自然之數也今六甲納音遇策數之十皆除去不用而用者乃策數所除之餘耳餘一與六為火餘二與七為土餘三與八為木餘四與九為金餘五與十為水策不用十其義在此然十者數之全去十不用何也歸藏取則河圗者也河圗藏十不具是以歸藏去十不用去十不用然後納音之數得彰其用此不用者所以為用者歟五行一隂陽也隂陽一太極也五行在天地間獨陽不生獨隂不成未嘗無偶然金木土之卦分隂分陽以為偶水火之卦何無偶也坎為水隂中涵陽離為火陽中涵隂隂陽之精互藏其宅故也乾偏陽坤偏隂震艮一陽巽兊一隂皆居卦體之偏偏於陽者必偶以隂偏於隂者必偶以陽此金木土卦之有偶也嗚呼八卦八而五行五本難齊也造化自然之妙布金木土卦為六約水火卦為二以五入八以八藏五故能齊其所難齊歟伏羲六十四卦屬五行例乾兊屬金離屬火震巽屬木坎屬水艮坤屬土先天八宫宫各八卦即其卦外象之所屬以定其卦之為金火木水土是故五行八周於八宫總八宫而言屬金之卦十有六屬火之卦八屬木之卦十有六屬水之卦八屬土之卦十有六是之謂六十四卦屬五行之例然也伏羲之演八卦為六十四卦也不能増水火之卦使之多不能損金木土之卦使之少因乎卦象之自然而已黄帝之造六甲納音也不能備每宫用音而使之有不能泯每宫藏音而使之無亦曰因乎聲音之自然而已由是象與音協音與象應一順天理之流行實造化之大巧易道之至神也歟己亥為隂陽之終子午為隂陽之始六甲納音遇亥子己午之間隂陽終始之際數必交音必藏交則生生之機不息藏則化化之迹不露故癸亥甲子數交二十七音藏土卦則剥坤𨽻之己巳庚午數交三十音藏水卦則需𨽻之乙亥丙子數交二十八音藏木卦則歸妹中孚𨽻之辛巳壬午數交二十六音藏火卦則離𨽻之丁亥戊子數交二十四音藏金卦則无妄隨𨽻之癸巳甲午數交二十七音藏土卦則頤復𨽻之己亥庚子數交三十音藏水卦則井𨽻之乙巳丙午數交二十八音藏木卦則解渙𨽻之辛亥壬子數交二十六音藏火卦則旅𨽻之丁巳戊午數交二十四音藏金卦則否萃𨽻之大扺亥子巳午之交而藏也五行虚其位六十四卦備其象皆自然而然不可容一毫人力増損其間儻於亥子巳午之外求其交而藏也則五行之序無其位六十四卦之序無其象雖離婁之明公輸子之巧終不可得而牽强求合矣此己亥子午之中其見天地之心乎三易備遺卷五
