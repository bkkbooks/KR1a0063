  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0063_WYG_002-1a, image: WYG0020/WYG0020-0755c.png}
body:
  text: 三易備遺卷二宋朱元升撰先天連山易連山述意夫連山者三易之首也案周禮疏謂夏曰連山又述杜子春謂連山為伏羲易夏因其名是知連山作於伏羲夏后氏用連山亦猶歸藏作於黃帝商人用歸藏其義一也夫子曰我欲觀夏道是故之把而不足徵也吾得夏時焉嗚呼連山雖亡夏時猶在夫子說卦曰天地定位山澤通氣雷風相薄水火不相射者實與河圗卦位相應又曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮者實與洛書卦位相應雖河圗洛書分方各異為用不同然即圗書卦位參夏時氣候如以圭測景以針定方知其為無爽也夫子之杞而得者其此乎連山之易可證者其此乎夫子說卦述昔者聖人之作易也杜子春謂連山作於伏羲因於夏后氏不其然乎愚於是述連山備遺繫辭曰易有太極是生兩儀兩儀生四象四象生八卦此一章夫子所以明伏羲畫卦之例此一圗所以寫夫子此一章之㫖夫太極是此易本有底道理儀象八卦是此極自然生出底道理非别有太極在易之外生儀象八卦故太極既判竒偶始生􅅀者是為陽儀􅄲者是為隂儀陽儀之上生一陽為竒者太陽也又生一隂為偶者少隂也隂儀之上生一陽為竒者少陽也又生一隂為偶者太隂也是謂四象太陽之上復生一竒一偶即乾一兊二也少隂之上復生一竒一偶即離三震四也少陽之上復生一竒一偶即巽五坎六也太隂之上復生一竒一偶即艮七坤八也是謂八卦夫以一加倍為兩兩加倍為四四加倍為八而小成之卦備矣八卦之上復用竒偶加之則以八加倍為十六十六加倍為三十二三十二加倍為六十四而大成之卦備矣此文公朱子所謂方圗只是據見在底畫者是也又謂此圗本於自然流出不假安排乃易學綱領開卷第一義者是也文公朱子與門人言先天圗曰圎圗是有些子造作模樣方圗只是據見在底畫圎圗便是就這中間拗做兩截恁底轉來底是竒恁底轉去底是偶便有些不甚依他當初畫底然伏羲當初也只見這太極下面有箇隂陽便知是一生二二又生四四又生八恁底推將去做成這物事愚謂先天圎圗就中間拗做兩截非是伏羲出己意見拗做兩截是天出河圗如此伏羲則之耳河圗九居南四居東南三居東八居東北伏羲因河圗如此置數於南於東也故以乾配九以兊配四以離配三以震配八自乾一兊二離三震四恁底轉來底自然是竒又河圗一居北六居西北七居西二居西南伏羲因河圗如此置數於北於西也故以巽配二以坎配七以艮配六以坤配一自巽五坎六艮七坤八恁的轉去的自然是偶是故夫子於下繫述太極生兩儀兩儀生四象一章明伏羲畫卦之序於說卦述數往者順知來者逆一章明伏羲設卦之方倘二圗不𫝊則夫子二章之詞不幾於空言乎噫邵子所以有功於作易之聖人雖然微朱子孰明其藴是亦有功於作易之聖人也歟易有太極是易之中元有此極實為造化根本非易之外别更有一箇太極也太極之理具於河圗洛書而顯於兩儀四象八卦由今觀之河圗之數用九也然乾九坤一相對為十自巽二震八而下相對皆十何也九者河圗之數也一者太極也此太極在河圗也洛書之數用十也然坎一坤十相對為十一自離二乾九而下相對皆十一何也十者洛書之數也一者太極也此太極在洛書也先天八官之卦六十四也然乾一對坤六十四其數為六十五夬二對剝六十三其數亦六十五自此以下兩兩相對其數皆六十五何也六十四者卦之數也一者太極也此太極在卦象也太極無乎不在即河圗而在河圗即洛書而在洛書即卦象而在卦象潛藏密拱未嘗間斷有箇天地便有箇太極在這裏流轉不假安排靡有虧缺此一之流行於圗書卦象雖未嘗顯其名圗書卦象之默涵乎此一則末嘗離其體太極其此一之謂歟說卦曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也此伏羲則河圗以定八卦之位然也先儒以此一節明伏羲八卦是矣然自其指十為河圗九為洛書則是說卦此章先述伏羲則洛書以定八卦之位而後章始及則河圗以定八卦之位與上繫曰河出圗洛出書聖人則之之辭先後為不同矣况先儒又指說卦後章出震齊巽見離役坤說兊戰乾勞坎成艮一節為明文王八卦若然伏羲八卦取則洛書者也文王八卦取則河圗者也似不其然劉長民謂河圗洛書俱出於伏羲之世九為河圗十為洛書而蔡季通疑其非是援關子明之說指十為河圗九為洛書未免數自數象自象矣惟即夫子說卦二章之辭循八卦之象契圗九書十之數然後數與象合象與數合而說卦二章之辭悉與象數合信長民之說為不誣云說卦曰萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所說也故曰說言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮此伏羲則洛書以定八卦之位然也先儒以此一節明文王八卦然也即夫子說卦之辭證夏時之候立春在艮實應連山首艮之說故夫子於兊之方表而出之曰兊正秋也於艮之方表而出之曰萬物之所成終而所成始也若夫文王作周易建子正而謂行夏之時然歟否歟夫子繫辭言包犧氏之王天下必冠以古者之詞於說卦亦兩言以表之曰昔者聖人之作易則其指包犧氏明矣故愚謂河圗洛書並出於伏羲之世長民之說為信然說卦曰神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也連山易之作昔者聖人既則之河圗又則之洛書說卦上章别而言之深切著明矣於此一章復總而言之其述洛書卦位止曰雷風火澤水艮不曰乾坤其述河圗卦位止曰水火雷風山澤不曰乾坤此圗探夫子此章之辭合圗與書總而一之書所以應乎地圗所以應乎天天包地者也內卦循洛書震巽離兊坎艮之序以為之經外卦循河圗兊離震巽坎艮之序以為之緯外卦所以緯內卦者也自內卦秩而言之動萬物撓萬物燥萬物說萬物潤萬物終始萬物此圗與此章之詞實相吻合自外卦對而觀之水必與火相逮雷必與風不相悖山必與澤通氣此圗與此章之辭無一象不相似然者夫子不言乾坤而曰神也者妙萬物而為言者也乾坤其神矣乎噫非此一章無以明乾坤神六子之用非此一圗旡以明此一章例連山之義然則謂昔者聖人之作連山易也兼取則於圗書詎不信然雖然所以神乾坤於不用者何謂也今夫制律厯者之言數也必究夫數之始數之中數之終故然後能通律厯之妙有如乾在河圗其數九坤在河圗其數一此乾坤占夫河圗之數之始終者也乾在八卦位居一坤在八卦位居八此又乾坤占夫八卦之數之始終者也漢律厯志曰并終數為十九易窮則變此又指乾坤在洛書占夫洛書之數之始終者也由是言之說卦此章述昔者聖人作易之意不言乾坤是殆神夫數之始終以妙其用也夫道可受而不可𫝊此章之㫖微矣其可以言言乎哉一嵗之內二至二分四立是之謂八節乃一嵗之綱領也然綱領一嵗者八節也而所以綱領八節者乾坤也純坤與復上之坤𨽻冬至也無妄上之乾與明夷上之坤𨽻立春也同人上之乾與臨上之坤𨽻春分也履上之乾與泰上之坤𨽻立夏也純乾與姤上之乾𨽻夏至也升上之坤與訟上之乾𨽻立秋也師上之坤與遁上之乾𨽻秋分也謙上之坤與否上之乾𨽻立冬也此非人為安排之巧皆出於象數自然而然夫子說卦以妙萬物之神為言而不言乾坤此圗寫出乾坤不離於八節之交正以分八節育萬物成嵗功固六子迭運之力實乾父坤母綱領之造然則乾坤不其神乎案周禮疏賈公彥釋連山之義曰此連山易其卦以純艮為首艮為山山上山下是名連山即賈氏之疏稽之說卦之辭夏時之候夏建寅正純艮實庀立春春為時之首艮所以為連山易之首乎考之漢律厯志述三統謂人統寅木也太簇律長八寸象八卦虙戲氏之所以順天地通神明類萬物也以是知伏羲氏已用寅正夏后氏因之而已故賈公彥謂連山作於伏羲因於夏后氏此之謂也連山易亡已久矣因周禮得存其名因說卦得存其義因夏時得存其用自漢太初改正朔復行夏之時民到於今受其賜其夫子之把之功歟連山易夏時之取則也而堯典一書分命羲和亦夏時之取則也以書考易其義一也書曰日中星鳥以殷仲春日永星火以正仲夏宵中星虛以殷仲秋日短星昴以正仲冬蓋取中星以定四時者也今即連山易而布以二十八宿冬至其卦也復其宿也虛夏至其卦也姤其宿也星春分其卦也臨其宿也氐房秋分其卦也遁其宿也昴四時之二至二分以卦準宿即堯典之中星不特此也自漢太初元年改正朔行夏時至今千三百七十餘年厯法之沿革雖不同而大概則可考立春之候日躔虛立夏之候日躔昴立秋之候日躔星立冬之候日躔氐四時之四立以厯準宿即連山之中星嗚呼自夏時之革而為丑正子正也夫子居春秋之世而欲行夏之時雖書其事於經不得行其志於時自太初之革亥正而為寅正也愚也居今之世得述其志得見其事豈不為連山易之幸歟三易備遺卷二
