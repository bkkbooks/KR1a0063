body:
  text: 三易備遺卷九宋朱元昇撰後天周易後天六宫先天八宫乾一兊二離三震四巽五坎六艮七坤八是也後天六宫乾一離二震三巽四坎五坤六是也先天之八則河圖而置卦位後天之六亦則河圖而置卦位一本乎天之所出河圖而置之焉耳雖然後天之六其精㣲之緼有諸儒口耳𫝊授簡編摩寫所不到者抑予何從而知之歟蓋造化杳冥人之所以能測之者每於其交際之間得之是故觀歸藏者必於子午己亥之交象泰九三者必曰天地際也今予於後天之六亦惟於乾坤離坎震巽六宫之交有以窺之然後文王作易之心始可得而言矣於是作後天六宫交圖此交圖者所以寫文王作易之心也今夫言易必觀象考數有以見聖人作易之心始可與言易矣由文王至於夫子五百餘年爾夫子必之杞之宋得夏時焉得坤乾焉然後係易有以契三聖人作易之心也夫子既歿言易者尚矣能窺先聖人作易之心者不多有惟邵子康節𫝊先天圖得伏羲作易之心衍皇極經世一元之數得文王作易之心由夫子而至於今去聖人逾逺惑於圖書之九十膠於𫝊釋之異同聖人作易之心不愈晦乎今曰此交圖者所以寫文王作易之心然則文王之心可得而言歟伏羲之易八其八文王之易六其六此交圖可以見文王作易之心也連山二篇之䇿萬有一千五百二十周易二篇之策萬有二千九百六十此交圖可以見文王作易之心也易有四象所以示也老陽老隂奠上下之位少陽少隂列左右之偶上經序卦下經序卦豈曰偶然斯焉取爾此交圖可以見文王作易之心也嗚呼此交圖者其玩易者之筌蹄歟周易六六伏羲六十四卦八而八之一貞八悔貞其内悔其外也此伏羲易之妙也文王六十四卦六而六之正而觀則内者為貞外者為悔反而觀則悔復為貞貞復為悔此文王之易不其愈妙乎今舉乾之交言之乾交坎其卦為需反之則坎交乾為訟是需訟二卦本一卦也乾交離其卦為大有反之則離交乾為同人是大有同人二卦本一卦也乾交坤其卦為泰反之則坤交乾為否是否泰二卦本一卦也乾交巽兊為夬為小畜反之則巽兊交乾為姤為履乾交震艮為大畜為大壯反之則震艮交乾為遯為无妄是夬小畜姤履大畜大壯遯无妄皆以二卦為一卦也由乾而推則坤也坎離也震艮巽兊也可以槩見矣故乾坤坎離交而乾坤坎離卦之不反對者也震艮巽兊交而頤大過中孚小過卦之不反對者也不反對者經乎其外反對者緯乎其内此交圖之作所以見文王作易之心𫝊曰方以類聚物以羣分其交圖之謂歟今夫交圖者布三十六卦為六宫卦之具乾體者隷乾宫卦之具坤體者隷坤宫卦之具坎離體者隷坎離宫卦之具震艮巽兊體者隷震艮巽兊宫猶二十八宿森羅在天各有分野不相踰越出於天然之妙非假人為之巧吾故曰此交圖者可以見文王作易之心雖然否泰以乾坤交隷乾宫可也而既未濟以坎離交隷坤宫何也晉明夷需訟以乾坤坎離交隷震艮巽兊宫又何也噫坎離在上經則佐乾坤在下經則佐震艮巽兊此周易之所以作此交圖見文王作易之心愚謂後天交圖有以見文王作易之心蓋不一言之矣言無證不信嘗證之數圖與數恊證之象圖與象恊又證之周易序卦卦與象數恊固非髣髴臆度者之為今以交圖六宫分隷之卦證諸周易上下經分隷之卦益信此交圖可以見文王作易之心何以言之交圖乾坤宫十二卦隷上經者八隷下經者四震艮巽兊宫十二卦隷上經者四隷下經者八坎離宫十二卦隷上經者六隷下經者六夫六宫之卦分隷上下經多寡之間等齊之際豈無意歟周易之作也用乾坤主上經用震艮巽兊主下經用坎離佐上下經今此交圖隷乾坤宫之卦多於上經隷震艮巽兊宫之卦多於下經隷坎離宫之卦均之上下經此正文王作易之心然也愚於此交圖也益有以自信周易二篇連山二篇自復至乾為陽儀自姤至坤為隂儀其策萬有一千五百二十歸藏二篇自甲子至癸巳為先甲自甲午至癸亥為後甲其䇿萬有八百周易二篇自乾坤至坎離為上經自咸恒至既未濟為下經其䇿萬有二千九百六十此三易二篇之大畧也係詞曰二篇之䇿萬有一千五百二十舉連山䇿而言之也夫子獨言連山之䇿何也連山三易之祖也三易經卦皆八其别皆六十有四何䇿數之不相似然者噫於斯可以見三聖人作易之心矣今姑以周易言之周易以反對為用約六十四卦為三十六卦上篇為爻一百八下篇為爻一百八陽爻配隂爻隂爻配陽爻二其一百八也二其一百八則二百一十六其六十之䇿也邵子康節衍一元之數曰十二萬九千六百蓋述周易二百一十六其六十之䇿大而衍之也伏羲則圖之九書之十為連山之八文王衍連山之八為周易之六邵子康節衍文王之六為皇極經世書之四皇極經世書以四為用者也觀易者試審思之則聖賢作易之心庶可得而言矣文公朱子有曰程先生説易得其理則象數在其中固是如此然遡流以觀卻須先見象數的當下落方説得理不走不然事無實證則虚理易差也今此交圖謂得文王作易之心夫易作於數千載之前而欲遡作易之心於數千載之後於何以見其的當下處亦惟稽諸象數而已爾且交圖三十六卦以其位之對者衍之其數皆三百六十不特此交圖為然又以周易上經序卦下經序卦衍之其數亦三百六十無非合乎自然者葢三百六十當期之數先天為三百六十者三十有二後天為三百六十者三十有六三十二其三百六十是為萬有一千五百二十三十六其三百六十是為萬有二千九百六十又十倍之為十二萬九千六百皇極經世一元之數也一元之數三百六十其三百六十也三百六十之數天地人物咸備焉是故條其例庶以下原缺周易四象伏羲首百王而作易其畫六十四卦也一隂一陽爾文王繼伏羲而作周易其序六十四卦也亦一隂一陽爾説卦曰分隂分陽迭用柔剛此夫子明伏羲畫卦之例蓋亦明文王序卦之例予於六宫交圖見之矣易有四象曰老陽也曰老隂也曰少陽也曰少隂也老陽老隂奠上下之位少陽少隂列左右之偶此交圖出於自然而然者文王周易序卦位老陽老隂於諸卦之首所以繼萬化之體也偶少陽少隂於二老之後所以秩萬化之用也是故老陽偶老隂老隂偶老陽少陽偶少隂少隂偶少陽煥然有倫始終不渝自乾坤而屯蒙以至於頤大過坎離為上經自咸恒而遯大壯以至於渙節中孚小過既未濟為下經無非分隂分陽迭用柔剛伏羲之畫卦文王之序卦其揆一也昔邵子與程子論先天易程子謂邵子大段漏洩天機予於後天易也洩漏聖人不言之緼多矣然天欲明斯易以福斯世也予肄業及之所不敢黙用條其例以明文王作易之序或問曰周易自乾坤至既未濟夫子作序卦言夫象之理矣未及夫象之數也若曰理象數三者未甞相離盍言夫乾坤屯蒙而下諸卦象數之序為如何愚不敏望道未之見年經月緯意想神馳然後作六宫交圖如親見西伯於殷之末世得其設卦布䇿之原委老陽之䇿二百一十六老隂之䇿一百四十四乾坤者易之門故位上經之首少陽之䇿一百六十八凡九卦四在上經五在下經少隂之䇿一百九十二凡九卦四在上經五在下經此二十卦具四象之正䇿者也居老陽少隂之間者三卦其䇿皆二百有四居老隂少陽之間者三卦其䇿皆一百五十六居隂陽二少之間者十卦其䇿皆一百八十其策之二百有四者可退為少隂其䇿之一百五十六者可進為少陽其䇿之一百八十者可以進可以退進者五卦為少陽退者五卦為少隂進者凡八卦退者凡八卦進退之䇿節以十二上經八卦五進而三退下經八卦三進而五退進退以成其變化此易之序也係詞曰變化者進退之象也是之謂矣是故後天三十六卦老陽繼以老隂少陽繼以少隂秩秩相承三十四卦同一貫也至於姤夬獨以少隂而先少陽厥有㫖哉或問交圖所設卦位出於天乎出於人乎曰一本諸河圖而設之者爾河圖一居北九居南是以乾南而坤北也河圖三居東七居西是以離東而坎西也河圖八居東北六居西北伏羲位震於八位艮於六文王反對震艮本一卦是以震艮位坤離之間也河圖二居西南四居東南伏羲位巽於二位兊於四文王反對巽兊本一卦是以巽兊位乾坎之閒也由河圖言之則出於天由羲文言之則出於人人不天不因天不人不成也雖然震艮巽兊之位不得列於乾坤坎離之次而頤大過小過中孚之位乃得加於震艮巽兊之上何也曰乾坤坎離卦之正也頤大過小過中孚卦之變而正者也八正卦經乎圖之外二十八變卦緯乎圖之内此交圖設卦一本諸天之河圖與伏羲文王也無非自然而然惟其自然而然故由坤之一百四十四進而為師比之一百五十六再進而為坎為臨觀萃升蹇解屯蒙之一百六十八又再進而為節渙困井既濟未濟咸恒漸歸妹之一百八十又再進而為大過中孚為巽兊需訟之一百九十二又再進而為夬姤小畜履之二百四又再進而為乾之二百一十六進極則退由乾之二百一十六退而為同人大有之二百四再退而為離為遯大壯无妄大畜家人睽革鼎之一百九十二又再退而為豐旅噬嗑賁泰否損益隨蠱之一百八十又再退而為頤小過為震艮晉眀夷之一百六十八又再退而為剥復謙豫之一百五十六又再退而為坤之一百四十四退極則進進退循環不雜不越各稽其類此所以為交圖之妙也雖然進以十二退以十二何謂也曰老陽之䇿三十六陽極則退於隂以三十六退為二十四是退以十二也老隂之䇿二十四隂極則進於陽以二十四進為三十六是進以十二也雖然隂必六進陽必六退又何謂也曰易有六位卦有六爻兼三才而兩之故六六者非他三才之道也此夫子之言云然將奚疑吾故曰交圖者所以寫文王作易之心也三易備遺卷九
