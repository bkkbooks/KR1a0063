body:
  text: 三易備遺跋夫子既沒迄今七百年間諸以易名家者専於理則簡於象數専於象數則荒於理因注迷經因疏迷注致十翼本旨不白於世而世之學者果於襲舊疑於知新罕研聖人作易之根柢我先君子述三易備遺曰河出圖洛出書聖人則之此夫子明作易之根柢也故言理必考象言象必考數理象數無抵牾然後措諸詞寫諸圖自謂得聖人之心於注疏解釋之外有先儒所未發者視諸家言易理自理象自象數自數三易自三易河圖洛書自河圖洛書判然不相符者不侔矣噫此其於易也功不在名世諸儒下咸淳庚午備遺成侯部使者則堂家先生一見竒其書用聞於朝會國督戍事嚴未皇暇也送中書籍記越三載先子沒先兄起豫甫繼志纂述時事且别多所散失起豫甫亦下世矣士立弗克肖以夙夜罔敢懈惟父兄之志是酬補遺苴闕僅完其帙敬鋟諸梓非敢曰論撰其前人之美以顯揚之後世也易之晦也明也有時也人焉得而已諸時元貞乙未立春日男士立百拜謹志
