body:
  text: 三易備遺易類提要臣等謹案三易備遺十卷宋朱元升撰其子士立補葺元升字日華里貫未詳惟卷首載咸淳八年兩浙提刑家鉉翁進書狀稱承節郎差處州龍泉遂昌慶元及建寧松溪政和巡檢朱元升卷末士立跋稱咸淳庚午備遺成帙則堂家先生用聞於朝三載先子歿云云疑其即終於是官庚午為咸淳六年而狀署八年殆傳寫者誤六為八歟其書本河圖洛書三卷連山三卷歸藏三卷周易三卷元升自序亦兼言三易而鉉翁進狀特稱其著中天歸藏書數萬言未詳其故豈以先天後天皆儒者所傳述而中天之說元升創之故標舉見異耶然干寶周禮注稱伏羲之易小成為先天神農之易中成為中天黃帝之易大成為後天則中天實亦古名非新義也元升學本邵子其言河圖洛書則祖劉牧其言連山以卦位配夏時之氣候其言歸藏以干支之納音配卦爻其言周易則闡反對互體之㫖雖未必真合周官太卜之舊而冥心探索以求一合亦可謂好學深思者過而存之或亦足備說易者之參考耳乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀三易備遺原序周禮春官掌三易一曰連山二曰歸藏三曰周易連山作於伏羲用於夏歸藏作於黃帝用於商周易作於文王用於周一代之興必有一代之易雖不相沿襲而實相貫通連山首艮歸藏首坤周易首乾其經卦皆八其别皆六十有四是數聖人者豈各出意見以為斯易哉龍馬之所呈神龜之所授是皆得之天者也周公相成王設官分職命太卜命簭人並掌三易不以周用周易而置連山歸藏於無用是天固將以斯易託斯人也周轍既東周禮廢闕天之未喪斯文也復生孔子為天下木鐸黜八索闡十翼韋編三絶而周易繫矣之杞而得夏時焉之宋而得坤乾焉故天下後世有亡書無亡言而連山歸藏易𫝊矣是天又將以斯易託斯人也孔子既沒經秦厯漢連山歸藏寂然無聞惟周易孤行於世漢儒用心徒勤著眼不及或破碎一卦以直六日七分或牽强四卦以管二至二分或雜之以䜟緯之文或引之於老莊之境如盲摸象如管窺天萬端臆說千差並起是何易道之不幸也天開我宋五星奎聚兩曜合璧異人間生希夷陳摶以先天一圗𫝊种放放𫝊穆修修𫝊李之才之才𫝊邵子康節康節以超詣絶塵之資加以融㑹淹貫之學著皇極經世書包羅萬象該括三易本領正大規模宏逺是天又將以斯易託斯人也嗚呼易固墜也天固興之易固晦也天固彰之天之心欲以斯易福斯世也昭昭矣元升結髮讀書冥心易學慨皇王之道泯泯沒沒其不絶者若一線之繫千鈞也元升下旡位上旡應徒以疏賤抱此勤志根極理要鋪陳軌範掎揭淪墜顯發幽眇尚擬補皇王之絶學於千百世之上存皇王之良法於千百世之下輒不自揆本諸河圗洛書述三易備遺因世次而冠以先天中天後天之名庶幾連山歸藏得與周易並顯於世後之人或因此知邵子之心則知孔子周公之心與文王黃帝伏羲之心知孔子周公與文王黃帝伏羲之心則知天之心咸淳庚午冬至朱元升序
